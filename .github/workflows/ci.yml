name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Validate repo
        run: yarn verify

      - name: Package extension
        run: yarn package:extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-ci
          path: artifacts/*.zip
