<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <title>All-in-One Toolkit</title>
  <link rel="stylesheet" href="./popup.css" />
</head>

<body>
  <main id="app">
    <header>
      <div>
        <h1>All-in-One Toolkit</h1>
      </div>
      <div class="header-actions">
        <select id="language-select" class="lang-select" title="Dil">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
        </select>
        <select id="theme-select" class="lang-select" title="Tema">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <button id="bug-btn" class="icon-btn" title="Hata bildir">🐞</button>
        <!-- <button id="donate-btn" class="icon-btn" title="Destekle">❤</button> -->
      </div>
    </header>
    <section id="downloads-view">
      <div class="download-subtabs">
        <button class="subtab active" data-subtab="active">Aktif</button>
        <button class="subtab" data-subtab="history">Geçmiş</button>
        <div class="download-actions">
          <button id="sort-downloads" class="icon-btn rotate" title="Sırala" aria-label="Sırala">
            <svg class="sort-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path class="sort-arrow" d="M7 3.5L3.5 8H6v12h2V8h2.5L7 3.5z" />
              <path class="sort-lines" d="M12 8h8M12 12h6M12 16h4" />
            </svg>
          </button>
          <button id="clear-history" class="icon-btn" title="Geçmişi temizle">🗑</button>
        </div>
      </div>
      <div class="download-group" data-subtab="active">
        <div id="download-active"></div>
      </div>
      <div class="download-group" data-subtab="history">
        <div id="download-history"></div>
      </div>
    </section>
  </main>
  <script type="module" src="./popup.js"></script>
</body>

</html>
